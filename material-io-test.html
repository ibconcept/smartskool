<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Material IO CDN Test</title>
    <!-- Material Icons CDN -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <!-- Material UI CDN -->
    <link
      href="https://unpkg.com/@material-ui/core@latest/umd/material-ui.development.js"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Roboto", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5f5;
      }
      .container {
        text-align: center;
      }
      .material-icons {
        font-size: 48px;
        color: #3f51b5;
      }
      .mui-btn {
        margin: 10px;
      }
      .form-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 300px;
        margin-top: 20px;
      }
      .form-container input,
      .form-container select,
      .form-container textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Material IO CDN Test</h1>
      <p>Check if Material Icons and UI components are working:</p>
      <!-- Material Icons -->
      <span class="material-icons">face</span>
      <span class="material-icons">home</span>
      <span class="material-icons">settings</span>
      <div class="button">
        <!-- Material UI Buttons -->
        <button class="mui-btn mui-btn--raised mui-btn--primary">
          Primary Button
        </button>
        <button class="mui-btn mui-btn--raised mui-btn--secondary">
          Secondary Button
        </button>
        <button class="mui-btn mui-btn--raised mui-btn--danger">
          Danger Button
        </button>
      </div>
      <div class="form-container">
        <!-- Simple Form -->
        <h2>Contact Us</h2>
        <input type="text" placeholder="Name" />
        <input type="email" placeholder="Email" />
        <select>
          <option value="">Select a topic</option>
          <option value="support">Support</option>
          <option value="sales">Sales</option>
          <option value="feedback">Feedback</option>
        </select>
        <textarea rows="4" placeholder="Your message"></textarea>
        <button class="mui-btn mui-btn--raised mui-btn--primary">Submit</button>
      </div>
    </div>
  </body>
</html>
